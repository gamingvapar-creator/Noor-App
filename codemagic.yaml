# Codemagic CI/CD Configuration File
# For more information on configuring build pipelines, see: https://docs.codemagic.io/

workflows:
  android-build:
    name: Build Android App
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 22
      java: 17
      groups:
        - production-env
      vars:
        NODE_ENV: "production"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'master'
          include: true
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ~/.gradle/caches
    scripts:
      - name: Install JS/TS dependencies
        script: |
          npm ci --legacy-peer-deps --include=dev
      - name: Build Web app
        script: |
          npm run build
      - name: Sync Capacitor configuration
        script: |
          npx cap sync
      - name: Build Android natively
        script: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
